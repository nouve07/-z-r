<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><style>body{margin:0;background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;cursor:pointer}#msg{color:#fff;font-size:2.2rem;text-align:center;user-select:none;text-shadow:0 0 10px #ff69b4}.h{position:absolute;color:#ff69b4;pointer-events:none;animation:e 1.2s ease-out forwards;font-size:30px}@keyframes e{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}</style></head><body><div id="msg">Özür dilerim yavrum 🤍</div><script>function c(x,y){const h=document.createElement('div');h.innerHTML='💗';h.className='h';h.style.setProperty('--dx',(Math.random()-0.5)*500+'px');h.style.setProperty('--dy',(Math.random()-0.5)*500+'px');h.style.left=x+'px';h.style.top=y+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),1200)}window.addEventListener('click',(e)=>{for(let i=0;i<15;i++)c(e.clientX,e.clientY)});window.onload=()=>{const cx=window.innerWidth/2,cy=window.innerHeight/2;for(let i=0;i<25;i++)setTimeout(()=>c(cx,cy),i*60)}</script></body></html>
