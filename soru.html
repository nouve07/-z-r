<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sana Bir Sorum Var</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Eriyen Kalpler Arkaplanı */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #ff1493;
            box-shadow: 0 0 20px #ff1493;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff1493;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 100px; /* Butonların kaçması için alan */
            align-items: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
        }

        #yesBtn {
            background: #ff1493;
            color: white;
            box-shadow: 0 0 15px #ff1493;
        }

        #noBtn {
            background: #444;
            color: white;
            position: absolute; /* Kaçması için şart */
        }

        #result {
            display: none;
            font-size: 2rem;
            color: #ff1493;
            text-shadow: 0 0 15px #ff69b4;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="container" id="mainBox">
        <h1>Beni hala seviyor musun? ✨</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">EVET</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">HAYIR</button>
        </div>
    </div>

    <div id="result">Ben de seni çok seviyorum! ❤️🌹</div>

    <script>
        // 1. Eriyen/Akan Kalp Efekti
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const hearts = [];
        function createHeart() {
            return {
                x: Math.random() * canvas.width,
                y: -20,
                size: Math.random() * 15 + 10,
                speed: Math.random() * 2 + 1,
                opacity: Math.random() * 0.5 + 0.5
            };
        }

        function drawHearts() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff1493';
            hearts.forEach((h, i) => {
                ctx.globalAlpha = h.opacity;
                ctx.font = h.size + 'px serif';
                ctx.fillText('❤️', h.x, h.y);
                h.y += h.speed;
                if (h.y > canvas.height) hearts[i] = createHeart();
            });
            requestAnimationFrame(drawHearts);
        }

        for(let i=0; i<30; i++) hearts.push(createHeart());
        drawHearts();

        // 2. Kaçan Buton Mantığı
        const noBtn = document.getElementById('noBtn');
        function moveNo() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.position = 'fixed'; // Ekranın her yerine kaçabilir
        }

        // 3. Evet Butonu Sonucu
        function celebrate() {
            document.getElementById('mainBox').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            // Arka planı daha da yoğunlaştır
            for(let i=0; i<100; i++) hearts.push(createHeart());
        }

        // Ekran boyutu değişirse canvası güncelle
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
  </html>
