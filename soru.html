<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sorum Var</title>
    <style>
        body { background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; margin: 0; }
        h1 { color: #fff; text-align: center; z-index: 10; }
        .buttons { position: relative; width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; z-index: 10; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; position: absolute; transition: 0.2s; }
        #evetBtn { background-color: #fff; color: #000; transform: translateX(-70px); }
        #hayirBtn { background-color: #ff4500; color: white; transform: translateX(70px); }
        #kalpEkran { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; flex-direction: column; align-items: center; justify-content: center; font-size: 100px; z-index: 100; }
        #kalpEkran p { font-size: 24px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="anaIcerik">
        <h1>Beni seviyor musun? ❤️</h1>
        <div class="buttons">
            <button id="evetBtn" onclick="evetDedim()">Evet</button>
            <button id="hayirBtn" onmouseover="kac()" onclick="kac()">Hayır</button>
        </div>
    </div>

    <div id="kalpEkran">
        🤍
        <p>Ben de seni çok seviyorum!</p>
    </div>

    <script>
        function kac() {
            var btn = document.getElementById('hayirBtn');
            var x = Math.random() * (window.innerWidth - btn.offsetWidth);
            var y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = 'none'; // İlk baştaki ortalamayı bozması için
        }

        function evetDedim() {
            document.getElementById('anaIcerik').style.display = 'none';
            document.getElementById('kalpEkran').style.display = 'flex';
        }
    </script>
</body>
</html>
