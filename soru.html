<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sorum Var</title>
    <style>
        body { background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; margin: 0; color: white; }
        .container { text-align: center; z-index: 10; }
        .buttons { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; position: relative; height: 200px; width: 100%; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; z-index: 20; }
        #evetBtn { background-color: #fff; color: #000; position: relative; }
        #hayirBtn { background-color: #ff4500; color: white; position: absolute; }
        .pembe-kalp { position: fixed; top: -10%; font-size: 24px; color: #ff69b4; animation: dokulme 3s linear infinite; z-index: 5; pointer-events: none; }
        @keyframes dokulme { to { transform: translateY(110vh) rotate(360deg); } }
        #finalEkran { display: none; position: fixed; inset: 0; background: black; color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        .patlama { font-size: 150px; animation: patla 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes patla { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="anaIcerik" class="container">
        <h1>Beni seviyor musun? ❤️</h1>
        <div class="buttons">
            <button id="evetBtn" onclick="evetDedim()">Evet</button>
            <button id="hayirBtn" onclick="hayirTikla()" onmouseover="kac()">Hayır</button>
        </div>
    </div>

    <div id="finalEkran">
        <div class="patlama">🤍</div>
        <h2 style="font-size: 35px; margin-top: 20px;">Bende seni seviyorumm</h2>
    </div>

    <script>
        let evetBoyut = 1;

        function kac() {
            let btn = document.getElementById('hayirBtn');
            let x = Math.random() * (window.innerWidth - btn.offsetWidth);
            let y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = 'none';
        }

        function hayirTikla() {
            evetBoyut += 1.2; // Evet butonunu her seferinde büyütür
            document.getElementById('evetBtn').style.transform = `scale(${evetBoyut})`;
            kac();
        }

        function evetDedim() {
            document.getElementById('anaIcerik').style.display = 'none';
            document.getElementById('finalEkran').style.display = 'flex';
            setInterval(kalpYagdir, 100); // Sınırsız pembe kalp dökülür
        }

        function kalpYagdir() {
            const kalp = document.createElement('div');
            kalp.innerHTML = '💗';
            kalp.className = 'pembe-kalp';
            kalp.style.left = Math.random() * 100 + 'vw';
            kalp.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(kalp);
        }
    </script>
</body>
</html>
