<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benim Işığım Sensin</title>
    <style>
        /* 1. Temel Sayfa Yapısı */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Tam siyah */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: none; /* Mobilde kaydırmayı engeller, sadece ışık hareket eder */
        }

        /* 2. Gizli İçerik (Işık gelince görünür) */
        .content {
            position: absolute;
            text-align: center;
            opacity: 0; /* Başlangıçta tamamen gizli */
            transition: opacity 0.8s ease-in-out;
            z-index: 1;
            padding: 25px;
            pointer-events: none;
        }

        .white-heart {
            font-size: 60px;
            color: #ffffff; /* Beyaz Kalp */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            animation: beat 1.5s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .content h1 { 
            color: #ffffff; 
            font-size: 2.2rem; 
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .content p { 
            color: #cccccc; 
            font-size: 1.1rem; 
            line-height: 1.6;
            max-width: 300px;
        }

        /* 3. El Feneri Efekti (Maskeleme) */
        .flashlight {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 10;
            /* Dinamik radial gradient */
            background: radial-gradient(
                circle var(--size, 80px) at var(--x, 50%) var(--y, 50%),
                rgba(255, 255, 255, 0.1) 0%,
                rgba(0, 0, 0, 0.99) 100%
            );
        }

        /* Kalp Atışı Animasyonu */
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>

    <div class="content" id="main-content">
        <div class="white-heart">❤</div>
        <h1>IŞIĞIM SENSİN</h1>
        <p>Karanlıkta yolumu bulmamı sağlayan tek şey senin varlığın...<br><br>
        Seni her şeyden çok seviyorum.</p>
    </div>

    <div class="flashlight" id="light"></div>

    <script>
        const light = document.getElementById('light');
        const content = document.getElementById('main-content');
        let currentSize = 80; // Başlangıç ışık boyutu
        let hasReachedMax = false;

        function moveLight(e) {
            // Fare veya Dokunmatik koordinatlarını al
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Işığın yerini güncelle
            light.style.setProperty('--x', x + 'px');
            light.style.setProperty('--y', y + 'px');

            // Kullanıcı hareket ettirdikçe ışık yavaş yavaş büyür ve yazı netleşir
            if (!hasReachedMax && currentSize < 350) {
                currentSize += 1.5;
                light.style.setProperty('--size', currentSize + 'px');
                content.style.opacity = (currentSize - 80) / 200;
                
                if(currentSize >= 350) hasReachedMax = true;
            }
        }

        // Hem mouse hem dokunmatik ekranlar için dinleyiciler
        window.addEventListener('mousemove', moveLight);
        window.addEventListener('touchmove', moveLight, { passive: false });
    </script>
</body>
</html>
